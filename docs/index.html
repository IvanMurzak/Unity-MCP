<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Game Developer — Unity MCP</title>
  <meta name="description" content="AI-powered game development assistant for Unity Editor & Runtime. Connect Claude, Cursor, & Copilot to Unity via MCP.">
  <link rel="icon" href="https://raw.githubusercontent.com/IvanMurzak/Unity-MCP/main/docs/img/unity/unity-logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #4a9eff;
      --sidebar-width: 260px;
      --sidebar-background: #1a1a2e;
      --sidebar-nav-link-color: #c0c0d0;
      --sidebar-nav-link-color--active: #4a9eff;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-name-color: #ffffff;
      --sidebar-name-font-size: 1.2rem;
      --sidebar-toggle-background: #4a9eff;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
    }

    .markdown-section {
      max-width: 900px;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      color: #e6edf3;
    }

    .markdown-section a {
      color: #58a6ff;
    }

    .markdown-section code {
      background-color: #21262d;
      color: #e6edf3;
      border-radius: 4px;
      padding: 2px 6px;
    }

    .markdown-section pre {
      background-color: #161b22 !important;
      border-radius: 8px;
      padding: 16px;
    }

    .markdown-section pre code {
      background-color: transparent;
      padding: 0;
    }

    .markdown-section table {
      display: table;
      width: 100%;
    }

    .markdown-section table th {
      background-color: #21262d;
      color: #e6edf3;
    }

    .markdown-section table td {
      border-color: #30363d;
    }

    .markdown-section table tr:nth-child(2n) {
      background-color: #161b22;
    }

    .markdown-section blockquote {
      border-left: 4px solid #4a9eff;
      background-color: #161b22;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
    }

    .markdown-section img {
      max-width: 100%;
      border-radius: 8px;
    }

    .markdown-section details {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 8px 16px;
      margin: 8px 0;
    }

    .markdown-section details summary {
      cursor: pointer;
      font-weight: 600;
      color: #58a6ff;
      padding: 4px 0;
    }

    .sidebar {
      background-color: #1a1a2e !important;
    }

    .sidebar-nav li a {
      color: #c0c0d0;
    }

    .sidebar-nav li a:hover {
      color: #4a9eff;
    }

    .app-name-link {
      color: #ffffff !important;
    }

    .search {
      background-color: #1a1a2e;
    }

    .search input {
      background-color: #21262d !important;
      color: #e6edf3 !important;
      border: 1px solid #30363d !important;
      border-radius: 6px;
    }

    .search .matching-post {
      background-color: #161b22;
      border-bottom-color: #30363d;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'AI Game Developer — Unity MCP',
      repo: 'https://github.com/IvanMurzak/Unity-MCP',
      homepage: 'https://raw.githubusercontent.com/IvanMurzak/Unity-MCP/main/README.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search...',
        noData: 'No results',
        depth: 3
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied'
      },
      alias: {
        '/README.es': '/README.es.md',
        '/README.ja': '/README.ja.md',
        '/README.zh-CN': '/README.zh-CN.md'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
