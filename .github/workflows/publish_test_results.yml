name: publish-test-results

# Runs after test-pull-request completes — uses write token from the base
# repo so it works for fork PRs (where the PR workflow token is read-only).

on:
  workflow_run:
    workflows: ["test-pull-request"]
    types: [completed]

permissions:
  checks: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'cancelled'

    steps:
      - name: Download all test result artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: artifacts/Event file for */event.json
          event_name: ${{ github.event.workflow_run.event }}
          files: artifacts/Test results for */**/*.xml
          comment_mode: changes in failures
