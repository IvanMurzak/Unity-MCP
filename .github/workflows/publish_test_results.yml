name: publish-test-results

# Runs after test-pull-request completes — uses write token from the base
# repo so it works for fork PRs (where the PR workflow token is read-only).

on:
  workflow_run:
    workflows: ["test-pull-request"]
    types: [completed]

permissions:
  actions: read
  checks: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'cancelled'

    steps:
      - name: Download all test result artifacts
        uses: actions/download-artifact@v6
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: artifacts/Event File/event.json
          event_name: ${{ github.event.workflow_run.event }}
          files: artifacts/Test results for */**/*.xml
          comment_mode: failures
          # Disable build-over-build comparison: it triggers a paginated GET on
          # /repos/{owner}/{repo}/commits/{before_sha}/check-runs that
          # intermittently returns 401 ("Bad credentials") even with valid
          # GITHUB_TOKEN + correct permissions. The first probe call with
          # per_page=1 succeeds; the immediately following per_page=100 fetch
          # 401s on the same URL with the same token. Disabling compare_to_
          # earlier_commit skips the problematic call entirely. The previous
          # comment_mode 'changes in failures' depended on this comparison,
          # so it's been simplified to 'failures' (always comment on failures).
          compare_to_earlier_commit: false
