name: Claude Code

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read Unity version
        run: |
          UNITY_VERSION=$(grep "^m_EditorVersion:" Unity-MCP-Plugin/ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          echo "UNITY_VERSION=${UNITY_VERSION}" >> $GITHUB_ENV
        shell: bash

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Unity-MCP-Plugin/Library
          key: unity-library-${{ env.UNITY_VERSION }}-ubuntu-base

      - name: Start AI-Game-Developer MCP Server
        run: |
          docker rm -f unity-mcp-server 2>/dev/null || true

          docker run -d \
            --name unity-mcp-server \
            --network host \
            -e MCP_PLUGIN_PORT=8080 \
            -e MCP_PLUGIN_CLIENT_TRANSPORT=streamableHttp \
            -e MCP_AUTHORIZATION=none \
            ivanmurzakdev/unity-mcp-server

          echo "Waiting for MCP Server to be ready..."
          for i in $(seq 1 12); do
            sleep 5
            if docker logs unity-mcp-server 2>&1 | grep -q "Start listening on port:"; then
              echo "MCP Server is ready."; break
            fi
            echo "Still waiting... ($((i*5))s)"
            if [ "$i" -eq 12 ]; then
              echo "Timeout waiting for MCP Server"
              docker logs unity-mcp-server
              exit 1
            fi
          done
        shell: bash

      - name: Activate Unity license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          docker rm -f unity-activate 2>/dev/null || true

          # Run activation synchronously — exits with Unity's exit code.
          docker run --rm \
            --name unity-activate \
            --network host \
            -e UNITY_EMAIL \
            -e UNITY_PASSWORD \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            unityci/editor:ubuntu-${UNITY_VERSION}-base-3 \
            unity-editor -quit -batchmode -nographics -logFile /dev/stdout \
              -username "$UNITY_EMAIL" -password "$UNITY_PASSWORD"

          echo "--- Activation exit: $? ---"
          echo "--- License dir contents: ---"
          ls -la /root/.local/share/unity3d/Unity/ 2>&1 || echo "(dir not found)"
        shell: bash

      - name: Start Unity Editor in background
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          docker rm -f unity-editor 2>/dev/null || true

          docker run -d \
            --name unity-editor \
            --network host \
            -e UNITY_EMAIL \
            -e UNITY_PASSWORD \
            -e UNITY_MCP_HOST=http://localhost:8080 \
            -e UNITY_MCP_KEEP_CONNECTED=true \
            -e UNITY_MCP_AUTH_OPTION=none \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            unityci/editor:ubuntu-${UNITY_VERSION}-base-3 \
            unity-editor -batchmode -projectPath /workspace/Unity-MCP-Plugin -logFile /dev/stdout

          echo "Waiting for Unity project to load..."
          for i in $(seq 1 48); do
            sleep 5
            # Fail fast if the container already exited
            if [ "$(docker inspect -f '{{.State.Status}}' unity-editor 2>/dev/null)" = "exited" ]; then
              echo "Unity Editor container exited early!"
              docker logs unity-editor
              exit 1
            fi
            if docker logs unity-editor 2>&1 | grep -q "MCP.*ready\|Compilation finished\|All assemblies built"; then
              echo "Unity is ready."; break
            fi
            echo "Still waiting... ($((i*5))s)"
            if [ "$i" -eq 48 ]; then
              echo "Timeout waiting for Unity Editor"
              docker logs unity-editor
              exit 1
            fi
          done
        shell: bash

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: >-
            --allowedTools Bash(*)
            --allowedTools Read(*)
            --allowedTools Write(*)
            --allowedTools Edit(*)
            --allowedTools Glob(*)
            --allowedTools Grep(*)
            --allowedTools WebFetch(*)
            --allowedTools WebSearch(*)
            --allowedTools Agent(*)
            --allowedTools NotebookEdit(*)
            --allowedTools TodoWrite
            --allowedTools Skill(*)
            --allowedTools TaskOutput(*)
            --allowedTools TaskStop(*)
            --allowedTools EnterPlanMode
            --allowedTools ExitPlanMode
            --allowedTools EnterWorktree
            --allowedTools AskUserQuestion
            --mcp-config '{"mcpServers":{"ai-game-developer":{"type":"streamableHttp","url":"http://localhost:8080"}}}'

      - name: Cleanup Docker containers
        if: always()
        run: |
          docker rm -f unity-mcp-server unity-editor 2>/dev/null || true
        shell: bash
